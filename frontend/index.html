<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S.</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/jarvis-icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jarvis">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <div id="orb-container">
            <div id="orb" class="idle"></div>
        </div>
        <div id="status">Klicke den Orb um zu sprechen</div>
        <div id="transcript"></div>
        <form id="chat-form" autocomplete="off">
            <input
                id="chat-input"
                type="text"
                placeholder="Nachricht an Jarvis..."
                autocomplete="off"
                autocorrect="off"
                autocapitalize="sentences"
                spellcheck="true"
                enterkeyhint="send"
            />
            <button id="chat-send" type="submit" aria-label="Senden">↑</button>
        </form>
    </div>
    <script src="/static/main.js"></script>
</body>
</html>
